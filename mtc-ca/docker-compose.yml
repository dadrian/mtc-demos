services:
  mtc-ca:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACTUS_REPOSITORY: https://github.com/dadrian/cactus.git
        CACTUS_REF: 03c3608d1258c22d88691ddcc107cd1f19f3cc8a
    image: mtc-demos/mtc-ca:latest
    container_name: mtc-ca
    hostname: mtc-ca
    ports:
      - "14000:14000"
      - "14080:14080"
      - "14090:14090"
    volumes:
      - ./state:/var/lib/cactus
      - ./keys/ca-cosigner.seed:/var/lib/cactus/keys/ca-cosigner.seed:ro
    networks:
      mtc-demo:
        aliases:
          - mtc-ca
          - ca.mtc-demo.test

networks:
  mtc-demo:
    name: mtc-demo
