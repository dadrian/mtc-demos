server {
    listen 443 ssl;
    server_name nginx-mtc-acme.mtc-demo.test localhost;

    ssl_certificate /var/lib/nginx-mtc-acme/certs/leaf.crt;
    ssl_certificate_key /var/lib/nginx-mtc-acme/private/leaf.key;
    ssl_protocols TLSv1.3;
    ssl_conf_command CipherString DEFAULT:@SECLEVEL=0;

    location / {
        default_type text/plain;
        return 200 "nginx-mtc-acme: standalone MTC from ACME with an ML-DSA leaf key\n";
    }
}
