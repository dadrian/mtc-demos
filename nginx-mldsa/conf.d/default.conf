server {
    listen 443 ssl;
    server_name nginx-mldsa.mtc-demo.test localhost;

    ssl_certificate /etc/nginx/certs/leaf.crt;
    ssl_certificate_key /etc/nginx/certs/leaf.key;
    ssl_protocols TLSv1.3;

    location / {
        default_type text/plain;
        return 200 "nginx-mldsa: ML-DSA certificate served by stock nginx:stable\n";
    }
}
