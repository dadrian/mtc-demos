services:
  nginx-mldsa:
    image: nginx:stable
    container_name: nginx-mldsa
    hostname: nginx-mldsa
    ports:
      - "14443:443"
    volumes:
      - ./conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      mtc-demo:
        aliases:
          - nginx-mldsa
          - nginx-mldsa.mtc-demo.test

networks:
  mtc-demo:
    external: true
    name: mtc-demo
