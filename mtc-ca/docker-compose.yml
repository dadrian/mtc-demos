services:
  mtc-ca:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACTUS_REPOSITORY: https://github.com/mcpherrinm/cactus.git
        CACTUS_REF: c7bcec61c45b3dd20964e2839eb9542ee8e7a5cf
    image: mtc-demos/mtc-ca:latest
    container_name: mtc-ca
    hostname: mtc-ca
    ports:
      - "14000:14000"
      - "14080:14080"
      - "14090:14090"
    volumes:
      - mtc-ca-data:/var/lib/cactus
    networks:
      mtc-demo:
        aliases:
          - mtc-ca
          - ca.mtc-demo.test

networks:
  mtc-demo:
    name: mtc-demo

volumes:
  mtc-ca-data:
